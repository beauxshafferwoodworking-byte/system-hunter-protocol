<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SYSTEM // Hunter Protocol</title>
  <meta name="theme-color" content="#020817" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SYSTEM" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="system-header">
      <div>
        <p class="eyebrow">SYSTEM ONLINE</p>
        <h1>Hunter Protocol</h1>
      </div>
      <button id="installBtn" class="ghost hidden">Install</button>
    </header>

    <main>
      <section class="panel hero-panel">
        <div class="scanline"></div>
        <div class="rank-block">
          <span id="rank">E-RANK</span>
          <small id="title">Exhausted Survivor</small>
        </div>
        <div class="level-row">
          <h2>LV. <span id="level">1</span></h2>
          <p><span id="xp">0</span>/<span id="nextXp">250</span> XP</p>
        </div>
        <div class="xp-bar"><div id="xpFill"></div></div>
        <div class="quick-stats">
          <div><strong id="streak">0</strong><span>Streak</span></div>
          <div><strong id="fatigueStatus">Stable</strong><span>Fatigue</span></div>
          <div><strong id="painStatus">Check</strong><span>Pain</span></div>
        </div>
      </section>

      <section class="panel">
        <h3>Daily Status Check</h3>
        <div class="grid-2">
          <label>Fatigue
            <select id="fatigue">
              <option value="1">1 - Fresh</option>
              <option value="2">2 - Good</option>
              <option value="3" selected>3 - Normal</option>
              <option value="4">4 - Drained</option>
              <option value="5">5 - Cooked</option>
            </select>
          </label>
          <label>Sleep Quality
            <select id="sleep">
              <option value="1">1 - Bad</option>
              <option value="2">2 - Rough</option>
              <option value="3" selected>3 - OK</option>
              <option value="4">4 - Good</option>
              <option value="5">5 - Great</option>
            </select>
          </label>
          <label>Lower Back Pain
            <select id="backPain">
              <option value="0">0 - None</option>
              <option value="1">1 - Mild</option>
              <option value="2" selected>2 - Noticeable</option>
              <option value="3">3 - Bad</option>
              <option value="4">4 - Severe</option>
            </select>
          </label>
          <label>Neck Pain
            <select id="neckPain">
              <option value="0">0 - None</option>
              <option value="1">1 - Mild</option>
              <option value="2" selected>2 - Noticeable</option>
              <option value="3">3 - Bad</option>
              <option value="4">4 - Severe</option>
            </select>
          </label>
        </div>
        <button id="generateQuest">Generate Today’s Quest</button>
      </section>

      <section class="panel">
        <div class="section-head">
          <h3>Daily Quest</h3>
          <span id="dayType" class="badge">Awaiting Input</span>
        </div>
        <div id="questList" class="quest-list"></div>
        <button id="completeDay" class="primary">Complete Daily Quest</button>
        <button id="missDay" class="danger">Mark Missed / Activate Penalty</button>
      </section>

      <section class="panel">
        <h3>Hunter Stats</h3>
        <div class="stats">
          <div><span>Strength</span><b id="str">1</b></div>
          <div><span>Endurance</span><b id="end">1</b></div>
          <div><span>Agility</span><b id="agi">1</b></div>
          <div><span>Vitality</span><b id="vit">1</b></div>
          <div><span>Recovery</span><b id="rec">1</b></div>
        </div>
      </section>

      <section class="panel">
        <h3>Penalty Zone</h3>
        <p id="penaltyText">No penalty active. Maintain your streak, Hunter.</p>
      </section>

      <section class="panel">
        <h3>System Log</h3>
        <div id="log" class="log"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-scroll="0">Status</button>
      <button data-scroll="1">Check</button>
      <button data-scroll="2">Quest</button>
      <button data-scroll="3">Stats</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
